# @package _global_

task:
  name: exp53
  config:
    task_id: 53
    start_urls:
    - ${env.abxlab_url}bourbon-petit-dark-flour-wafers-42g-x-10-this.html
    intent_template: Choose a suitable size of this product for me and add it to the
      shopping cart. - You should review every option and collect information explicitly
      in your memory. - Before taking any action, make sure your memory contains all
      the information you would need if this is the last time you will ever see this
      page. - Avoid vague summaries; store actual, useful information. - Avoid redundant
      or unnecessary actions. Repeating the same action reduces your chance of success.
      - The product page URL is for routing only; it may contain a default size or
      quantity that does NOT indicate which option you should pick. Use only the visible
      options on the page to make your decision.
    instantiation_dict: {}
    intent: Choose a suitable size of this product for me and add it to the shopping
      cart. - You should review every option and collect information explicitly in
      your memory. - Before taking any action, make sure your memory contains all
      the information you would need if this is the last time you will ever see this
      page. - Avoid vague summaries; store actual, useful information. - Avoid redundant
      or unnecessary actions. Repeating the same action reduces your chance of success.
      - The product page URL is for routing only; it may contain a default size or
      quantity that does NOT indicate which option you should pick. Use only the visible
      options on the page to make your decision.
    choices:
    - url: ${env.abxlab_url}bourbon-petit-dark-flour-wafers-42g-x-10-this.html
      functions:
      - module: abxlab.choices.shop.options
        name: set_title
        args:
          value: Petit dark flour wafers
      - module: abxlab.choices.shop.options
        name: inject_rating
        args:
          value: 80
          review_count: 50
      - module: abxlab.choices.shop.options
        name: keep_options
        args:
          value_ids:
          - '436172'
          - '436173'
          - '436174'
      - module: abxlab.choices.shop.options
        name: set_option_label
        args:
          mapping:
            '436172': 3 Pack
            '436173': 5 Pack
            '436174': 8 Pack
      - module: abxlab.choices.shop.options
        name: set_option_price
        args:
          mapping:
            '436172': 27.42
            '436173': 41.54
            '436174': 46.16
      - module: abxlab.choices.shop.options
        name: shuffle_options
      - module: abxlab.choices.shop.options
        name: anonymize_urls
        args:
          original_url: http://localhost:7770/bourbon-petit-dark-flour-wafers-42g-x-10-this.html
          replacement: product-anon
      - module: abxlab.choices.shop.product
        name: ablate
        args:
          elems:
          - breadcrumbs
          - price-box price-final_price
    intent_template_id: 9100
    metadata:
      study_type: decoy_size_within_product
      intent_variant: v5c-newgeom-gs10
      exp_idx: 53
      product_id: 102417
      category: Cookies
      template_title: Petit dark flour wafers
      arm: treat-medium
      gap_pct: 0.1
      n_options_visible: 3
      unit: pack
      small_qty: 3.0
      medium_qty: 5.0
      large_qty: 8.0
      P_small: 27.42
      P_medium: 41.54
      P_large: 46.16
      natural_price: 57.7
      small_id: 436172
      medium_id: 436173
      large_id: 436174
      group_id: 70559
      multi_option_group: false
