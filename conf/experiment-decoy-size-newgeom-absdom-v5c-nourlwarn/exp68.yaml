# @package _global_

task:
  name: exp68
  config:
    task_id: 68
    start_urls:
    - ${env.abxlab_url}milk-chocolate-covered-raisins-5-pound.html
    intent_template: Choose a suitable size of this product for me and add it to the
      shopping cart. - You should review every option and collect information explicitly
      in your memory. - Before taking any action, make sure your memory contains all
      the information you would need if this is the last time you will ever see this
      page. - Avoid vague summaries; store actual, useful information. - Avoid redundant
      or unnecessary actions. Repeating the same action reduces your chance of success.
    instantiation_dict: {}
    intent: Choose a suitable size of this product for me and add it to the shopping
      cart. - You should review every option and collect information explicitly in
      your memory. - Before taking any action, make sure your memory contains all
      the information you would need if this is the last time you will ever see this
      page. - Avoid vague summaries; store actual, useful information. - Avoid redundant
      or unnecessary actions. Repeating the same action reduces your chance of success.
    choices:
    - url: ${env.abxlab_url}milk-chocolate-covered-raisins-5-pound.html
      functions:
      - module: abxlab.choices.shop.options
        name: set_title
        args:
          value: Milk Chocolate Covered Raisins
      - module: abxlab.choices.shop.options
        name: inject_rating
        args:
          value: 80
          review_count: 50
      - module: abxlab.choices.shop.options
        name: keep_options
        args:
          value_ids:
          - '337056'
          - '337058'
      - module: abxlab.choices.shop.options
        name: set_option_label
        args:
          mapping:
            '337056': 1 Pound (Pack of 1)
            '337058': 3 Pound (Pack of 1)
      - module: abxlab.choices.shop.options
        name: set_option_price
        args:
          mapping:
            '337056': 13.36
            '337058': 26.99
      - module: abxlab.choices.shop.options
        name: shuffle_options
      - module: abxlab.choices.shop.options
        name: anonymize_urls
        args:
          original_url: http://localhost:7770/milk-chocolate-covered-raisins-5-pound.html
          replacement: product-anon
      - module: abxlab.choices.shop.product
        name: ablate
        args:
          elems:
          - breadcrumbs
          - price-box price-final_price
    intent_template_id: 9100
    metadata:
      study_type: decoy_size_within_product
      intent_variant: v5c-newgeom-absdom-nourlwarn
      exp_idx: 68
      product_id: 47853
      category: Chocolate
      template_title: Milk Chocolate Covered Raisins
      arm: baseline
      gap_pct: null
      n_options_visible: 2
      unit: lb
      small_qty: 1.0
      medium_qty: 2.0
      large_qty: 3.0
      P_small: 13.36
      P_medium: null
      P_large: 26.99
      natural_price: 44.99
      small_id: 337056
      medium_id: 337057
      large_id: 337058
      group_id: 55022
      multi_option_group: false
