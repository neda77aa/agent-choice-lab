# @package _global_

task:
  name: exp47
  config:
    task_id: 47
    start_urls:
    - ${env.abxlab_url}oplatki-traditional-christmas-wafers-set-of-12.html
    intent_template: Choose a suitable size of this product for me and add it to the
      shopping cart. - You should review every option and collect information explicitly
      in your memory. - Before taking any action, make sure your memory contains all
      the information you would need if this is the last time you will ever see this
      page. - Avoid vague summaries; store actual, useful information. - Avoid redundant
      or unnecessary actions. Repeating the same action reduces your chance of success.
    instantiation_dict: {}
    intent: Choose a suitable size of this product for me and add it to the shopping
      cart. - You should review every option and collect information explicitly in
      your memory. - Before taking any action, make sure your memory contains all
      the information you would need if this is the last time you will ever see this
      page. - Avoid vague summaries; store actual, useful information. - Avoid redundant
      or unnecessary actions. Repeating the same action reduces your chance of success.
    choices:
    - url: ${env.abxlab_url}oplatki-traditional-christmas-wafers-set-of-12.html
      functions:
      - module: abxlab.choices.shop.options
        name: set_title
        args:
          value: Traditional Christmas Wafers
      - module: abxlab.choices.shop.options
        name: inject_rating
        args:
          value: 80
          review_count: 50
      - module: abxlab.choices.shop.options
        name: keep_options
        args:
          value_ids:
          - '436121'
          - '436122'
          - '436123'
      - module: abxlab.choices.shop.options
        name: set_option_label
        args:
          mapping:
            '436121': 6 Count
            '436122': 8 Piece
            '436123': 12 Count
      - module: abxlab.choices.shop.options
        name: set_option_price
        args:
          mapping:
            '436121': 10.51
            '436122': 12.74
            '436123': 14.99
      - module: abxlab.choices.shop.options
        name: shuffle_options
      - module: abxlab.choices.shop.options
        name: anonymize_urls
        args:
          original_url: http://localhost:7770/oplatki-traditional-christmas-wafers-set-of-12.html
          replacement: product-anon
      - module: abxlab.choices.shop.product
        name: ablate
        args:
          elems:
          - breadcrumbs
          - price-box price-final_price
    intent_template_id: 9100
    metadata:
      study_type: decoy_size_within_product
      intent_variant: v5c-newgeom-gs10-nourlwarn-weak
      exp_idx: 47
      product_id: 102384
      category: Cookies
      template_title: Traditional Christmas Wafers
      arm: treat-weak
      gap_pct: 0.15
      n_options_visible: 3
      unit: count
      small_qty: 6.0
      medium_qty: 8.0
      large_qty: 12.0
      P_small: 10.51
      P_medium: 12.74
      P_large: 14.99
      natural_price: 14.99
      small_id: 436121
      medium_id: 436122
      large_id: 436123
      group_id: 70542
      multi_option_group: false
