          original_url: http://localhost:7770/richeese-nabati-cheese-wafer-8g-20-piece.html
          replacement: product-anon
      - module: abxlab.choices.shop.product
        name: ablate
        args:
          elems:
          - breadcrumbs
          - price-box price-final_price
